<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong Current Temperature</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .weather-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        .location {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        .temp {
            font-size: 64px;
            font-weight: bold;
            color: #ff5722;
            margin: 0;
        }
        .details {
            font-size: 16px;
            color: #666;
            margin-top: 15px;
        }
        .update-time {
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }
        .loading {
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="weather-card">
        <div class="location">Hong Kong</div>
        <div id="weather-display">
            <div class="loading">Loading weather data...</div>
        </div>
    </div>

    <script>
        // Fetching real-time current weather from HKO Open Data API
        const apiUrl = 'https://weather.gov.hk';

        async function fetchWeather() {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                // Extract relevant data
                const temp = data.temperature.data[0].value;
                const humidity = data.humidity.data[0].value;
                const updateTime = data.updateTime.substring(11, 19); 

                // Update HTML
                document.getElementById('weather-display').innerHTML = `
                    <div class="temp">${temp}°C</div>
                    <div class="details">Humidity: ${humidity}%</div>
                    <div class="update-time">Last updated: ${updateTime} HKT</div>
                `;
            } catch (error) {
                console.error('Error fetching weather:', error);
                document.getElementById('weather-display').innerHTML = `
                    <div class="details" style="color: red;">Failed to load temperature.</div>
                `;
            }
        }

        fetchWeather();
        // Refresh every 10 minutes (600,000 ms)
        setInterval(fetchWeather, 600000);
    </script>

</body>
</html>
