<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong Live Temperature</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 300px;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .time {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 20px;
        }
        .temp {
            font-size: 64px;
            font-weight: bold;
            margin: 10px 0;
        }
        .details {
            font-size: 16px;
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="weather-card">
        <h1>Hong Kong Weather</h1>
        <div class="time" id="update-time">Loading...</div>
        <div class="temp" id="temperature">--°C</div>
        <div class="details" id="humidity">Humidity: --%</div>
    </div>

    <script>
        function fetchHKWeather() {
            var url = 'https://weather.gov.hk';
            var xhr = new XMLHttpRequest();
            
            xhr.open('GET', url, true);
            
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            
                            // 1. Parse temperature array safely
                            var currentTemp = '--';
                            if (data && data.temperature && Array.isArray(data.temperature.data)) {
                                var hko = data.temperature.data.find(function(item) {
                                    return item.place === 'Hong Kong Observatory';
                                });
                                
                                if (hko && hko.value !== undefined) {
                                    currentTemp = hko.value;
                                } else if (data.temperature.data[0] && data.temperature.data[0].value !== undefined) {
                                    currentTemp = data.temperature.data[0].value;
                                }
                            }
                            
                            // 2. Parse humidity safely (Fixed array array layout indexing)
                            var currentHumidity = '--';
                            if (data && data.humidity && Array.isArray(data.humidity.data) && data.humidity.data[0]) {
                                currentHumidity = data.humidity.data[0].value || '--';
                            }
                            
                            // 3. Parse timestamp format safely
                            var timeString = 'Unknown';
                            if (data && data.updateTime) {
                                var updateTime = new Date(data.updateTime);
                                if (!isNaN(updateTime.getTime())) {
                                    timeString = updateTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                                }
                            }

                            // Render target displays
                            document.getElementById('temperature').innerText = currentTemp + '°C';
                            document.getElementById('humidity').innerText = 'Humidity: ' + currentHumidity + '%';
                            document.getElementById('update-time').innerText = 'Last Updated: ' + timeString;
                            
                        } catch (e) {
                            showError("Data Error");
                        }
                    } else {
                        showError("HTTP Code " + xhr.status);
                    }
                }
            };

            xhr.onerror = function () {
                showError("Network / Firewall Block");
            };

            xhr.send();
        }

        function showError(msg) {
            document.getElementById('temperature').innerText = 'Error';
            document.getElementById('update-time').innerText = 'Failed: ' + msg;
        }

        fetchHKWeather();
        setInterval(fetchHKWeather, 300000); // Auto update every 5 minutes
    </script>
</body>
</html>
