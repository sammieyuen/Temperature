<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong Live Temperature</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 300px;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .time {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 20px;
        }
        .temp {
            font-size: 64px;
            font-weight: bold;
            margin: 10px 0;
        }
        .details {
            font-size: 16px;
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="weather-card">
        <h1>Hong Kong Weather</h1>
        <div class="time" id="update-time">Loading time...</div>
        <div class="temp" id="temperature">--°C</div>
        <div class="details" id="humidity">Humidity: --%</div>
    </div>

    <script>
    function fetchHKWeather() {
        // Standard XMLHttpRequest supported by all legacy/modern ONELAN engines
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'https://weather.gov.hk', true);
        
        xhr.onload = function() {
            if (xhr.status >= 200 && xhr.status < 400) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    
                    var currentTemp = '--';
                    if (data.temperature && data.temperature.data && data.temperature.data.length > 0) {
                        var hkoTemp = data.temperature.data.filter(function(station) {
                            return station.place === 'Hong Kong Observatory';
                        })[0];
                        currentTemp = hkoTemp ? hkoTemp.value : data.temperature.data[0].value;
                    }
                    
                    var currentHumidity = '--';
                    if (data.humidity && data.humidity.data && data.humidity.data.value) {
                        currentHumidity = data.humidity.data.value;
                    }
                    
                    var timeString = 'Unknown';
                    if (data.updateTime) {
                        var updateTime = new Date(data.updateTime);
                        timeString = updateTime.toLocaleDateString() + ' ' + updateTime.toLocaleTimeString();
                    }

                    document.getElementById('temperature').innerText = currentTemp + '°C';
                    document.getElementById('humidity').innerText = 'Humidity: ' + currentHumidity + '%';
                    document.getElementById('update-time').innerText = 'Last Updated: ' + timeString;
                } catch (e) {
                    showError();
                }
            } else {
                showError();
            }
        };

        xhr.onerror = function() {
            showError();
        };
        
        xhr.send();
    }

    function showError() {
        document.getElementById('temperature').innerText = 'Error';
        document.getElementById('update-time').innerText = 'Failed to load data';
    }

    fetchHKWeather();
    setInterval(fetchHKWeather, 300000); // 5 min interval
</script>

</body>
</html>
