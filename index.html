<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKO Signage Component</title>
    <style>
        /* Resets default browser spacing for precise signage layout */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* Allows transparency on your ONELAN canvas */
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* The stylized container exactly matching your reference image */
        .weather-box {
            background-color: #2b3643; /* Precise charcoal gray color from sample */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 320px;
            padding: 18px 20px;
            box-sizing: border-box;
            border-radius: 2px;
        }

        /* Header layout holding title and timestamp */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid #f39c12; /* Yellow underline anchor */
            padding-bottom: 6px;
            margin-bottom: 8px;
        }

        .header-title {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .header-time {
            font-size: 12px;
            color: #bdc3c7;
            font-weight: 500;
        }

        .station-name {
            font-size: 14px;
            color: #ffffff;
            font-weight: bold;
            margin-top: 4px;
            margin-bottom: 12px;
        }

        /* Displays numbers */
        .metric-temp {
            font-size: 58px;
            font-weight: bold;
            line-height: 1.0;
            margin: 0;
            letter-spacing: -1px;
        }

        .metric-humidity {
            font-size: 46px;
            font-weight: bold;
            line-height: 1.1;
            margin: 0;
            color: #ffffff;
        }

        .error-overlay {
            font-size: 11px;
            color: #e74c3c;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="weather-box">
        <div class="header-row">
            <div class="header-title">Current Weather</div>
            <div class="header-time" id="lbl-time">Update at --:--</div>
        </div>
        <div class="station-name">HKO</div>
        <div class="metric-temp" id="lbl-temp">--°C</div>
        <div class="metric-humidity" id="lbl-humidity">--%</div>
        <div class="error-overlay" id="lbl-debug"></div>
    </div>

    <script>
        function queryObservatoryAPI() {
            // Using direct live JSON open data feed from HKO
            var endpoint = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en';
            var req = new XMLHttpRequest();
            
            req.open('GET', endpoint, true);
            req.onreadystatechange = function () {
                if (req.readyState === 4) {
                    if (req.status === 200) {
                        try {
                            var payload = JSON.parse(req.responseText);
                            
                            // Safe temperature collection 
                            var calculatedTemp = '--';
                            if (payload.temperature && Array.isArray(payload.temperature.data)) {
                                var mainStation = payload.temperature.data.find(function(item) {
                                    return item.place === 'Hong Kong Observatory';
                                });
                                // Target specific fallback checking
                                if (mainStation && mainStation.value !== undefined) {
                                    calculatedTemp = mainStation.value;
                                } else if (payload.temperature.data[0] && payload.temperature.data[0].value !== undefined) {
                                    calculatedTemp = payload.temperature.data[0].value;
                                }
                            }
                            
                            // Safe humidity array path reading
                            var calculatedHumid = '--';
                            if (payload.humidity && payload.humidity.data && Array.isArray(payload.humidity.data)) {
                                calculatedHumid = payload.humidity.data[0].value || '--';
                            } else if (payload.humidity && payload.humidity.data && payload.humidity.data.value) {
                                calculatedHumid = payload.humidity.data.value;
                            }
                            
                            // Generate display stamp string
                            var timeText = '--:--';
                            if (payload.updateTime) {
                                var parsedTime = new Date(payload.updateTime);
                                if (!isNaN(parsedTime.getTime())) {
                                    var hh = String(parsedTime.getHours()).padStart(2, '0');
                                    var mm = String(parsedTime.getMinutes()).padStart(2, '0');
                                    timeText = hh + ':' + mm;
                                }
                            }

                            // Inject variables into UI elements
                            document.getElementById('lbl-temp').innerText = calculatedTemp + '°C';
                            document.getElementById('lbl-humidity').innerText = calculatedHumid + '%';
                            document.getElementById('lbl-time').innerText = 'Update at ' + timeText;
                            document.getElementById('lbl-debug').innerText = ''; // Clear debug messages

                        } catch (err) {
                            displayFailure("Data Format Mapping Error");
                        }
                    } else {
                        displayFailure("HTTP Error Response: " + req.status);
                    }
                }
            };

            req.onerror = function () {
                displayFailure("Connection Dropped/Firewall Rule");
            };

            req.send();
        }

        function displayFailure(msg) {
            document.getElementById('lbl-temp').innerText = 'Error';
            document.getElementById('lbl-debug').innerText = msg;
        }

        // Initialize display properties immediately upon canvas load
        queryObservatoryAPI();
        // Refresh cycle handling configured to update card every 5 minutes
        setInterval(queryObservatoryAPI, 300000);
    </script>
</body>
</html>
