<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong Live Temperature</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 300px;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .time {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 20px;
        }
        .temp {
            font-size: 64px;
            font-weight: bold;
            margin: 10px 0;
        }
        .details {
            font-size: 16px;
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="weather-card">
        <h1>Hong Kong Weather</h1>
        <div class="time" id="update-time">Loading time...</div>
        <div class="temp" id="temperature">--°C</div>
        <div class="details" id="humidity">Humidity: --%</div>
    </div>

    <script>
        async function fetchHKWeather() {
            try {
                // Official GovHK Data API URL
                const response = await fetch('https://weather.gov.hk');
                const data = await response.json();
                
                // Safe parsing for temperature array data
                let currentTemp = '--';
                if (data.temperature && data.temperature.data) {
                    const hkoTemp = data.temperature.data.find(station => station.place === 'Hong Kong Observatory');
                    // Fall back to the first available station if official Observatory record is missing
                    currentTemp = hkoTemp ? hkoTemp.value : data.temperature.data[0].value;
                }
                
                // Safe parsing for humidity data
                let currentHumidity = '--';
                if (data.humidity && data.humidity.data && data.humidity.data[0]) {
                    currentHumidity = data.humidity.data[0].value;
                }
                
                // Format update time safely
                let timeString = 'Unknown';
                if (data.updateTime) {
                    const updateTime = new Date(data.updateTime);
                    timeString = updateTime.toLocaleString('en-HK', { dateStyle: 'medium', timeStyle: 'short' });
                }

                // Inject values into HTML
                document.getElementById('temperature').innerText = `${currentTemp}°C`;
                document.getElementById('humidity').innerText = `Humidity: ${currentHumidity}%`;
                document.getElementById('update-time').innerText = `Last Updated: ${timeString}`;
            } catch (error) {
                console.error('Error fetching weather data:', error);
                document.getElementById('temperature').innerText = 'Error';
                document.getElementById('update-time').innerText = 'Failed to load data';
            }
        }

        // Run function on load
        fetchHKWeather();
        // Refresh every 5 minutes
        setInterval(fetchHKWeather, 300000);
    </script>
</body>
</html>
